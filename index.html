<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WANGHAF // Prompt Gen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── shadcn/ui Dark Theme Tokens ── */
    :root {
      --background:    hsl(240 10% 3.9%);
      --foreground:    hsl(0 0% 98%);
      --card:          hsl(240 10% 3.9%);
      --card-foreground: hsl(0 0% 98%);
      --popover:       hsl(240 10% 3.9%);
      --primary:       hsl(0 0% 98%);
      --primary-foreground: hsl(240 5.9% 10%);
      --secondary:     hsl(240 3.7% 15.9%);
      --secondary-foreground: hsl(0 0% 98%);
      --muted:         hsl(240 3.7% 15.9%);
      --muted-foreground: hsl(240 5% 64.9%);
      --accent:        hsl(240 3.7% 15.9%);
      --accent-foreground: hsl(0 0% 98%);
      --destructive:   hsl(0 62.8% 30.6%);
      --destructive-foreground: hsl(0 0% 98%);
      --border:        hsl(240 3.7% 15.9%);
      --input:         hsl(240 3.7% 15.9%);
      --ring:          hsl(240 4.9% 83.9%);

      /* Prompt token colors – kept from original */
      --c-subject:   #00ffe0;
      --c-genre:     #ff8c42;
      --c-prop:      #a8e063;
      --c-echo:      #6ee7b7;
      --c-directive: #93c5fd;
      --c-era:       #c4b5fd;
      --c-framing:   #fbbf24;

      --radius: 0.5rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--background);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Layout ── */
    #pgr {
      width: 90%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 56px 0 100px;
    }

    @media (max-width: 600px) {
      #pgr { width: 100%; padding: 32px 20px 80px; }
    }

    /* ── Section label ── */
    .section-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted-foreground);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
    }

    /* ════════════════════════════════════════
       HEADER
    ════════════════════════════════════════ */
    .pg-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .pg-eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--muted-foreground);
      margin-bottom: 10px;
    }

    .pg-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--foreground);
    }

    .pg-title-accent { color: var(--foreground); opacity: 0.5; }

    .pg-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .pg-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--foreground);
      background: var(--secondary);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 999px;
    }

    .pg-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: hsl(142 71% 45%);
      box-shadow: 0 0 8px hsl(142 71% 45% / 0.6);
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.2; }
    }

    .pg-meta-row {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--muted-foreground);
    }

    /* ════════════════════════════════════════
       FLAGS SECTION
    ════════════════════════════════════════ */
    .flags-section {
      margin-bottom: 48px;
    }

    .flags-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      cursor: pointer;
      user-select: none;
    }

    .flags-section-header:hover .section-label { color: var(--foreground); }

    .flags-chevron {
      display: flex;
      align-items: center;
      color: var(--muted-foreground);
      transition: transform 0.2s ease, color 0.1s ease;
    }

    .flags-section-header:hover .flags-chevron { color: var(--foreground); }

    .flags-chevron.collapsed { transform: rotate(-90deg); }

    .flags-body {
      overflow: hidden;
      transition: opacity 0.2s ease;
    }

    .flags-body.collapsed {
      display: none;
    }

    .flags-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .flag-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s ease;
    }

    .flag-row:last-child { border-bottom: none; }
    .flag-row:hover { background: var(--secondary); }

    .flag-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .flag-name {
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--foreground);
      white-space: nowrap;
    }

    .flag-row.disabled .flag-name { color: var(--muted-foreground); }

    .flag-value-input {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--foreground);
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) - 2px);
      padding: 4px 8px;
      width: 68px;
      text-align: center;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .flag-value-input:hover { border-color: hsl(240 5% 34%); }
    .flag-value-input:focus {
      outline: none;
      border-color: var(--ring);
      box-shadow: 0 0 0 2px hsl(240 4.9% 83.9% / 0.15);
    }
    .flag-row.disabled .flag-value-input { opacity: 0.35; }

    .flag-desc {
      font-size: 12px;
      color: var(--muted-foreground);
      text-align: right;
    }

    /* Toggle switch – shadcn style */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: hsl(240 3.7% 25%);
      transition: background 0.15s ease;
      cursor: pointer;
    }

    .toggle input:checked + .toggle-track {
      background: var(--foreground);
    }

    .toggle-thumb {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--background);
      top: 3px;
      left: 3px;
      transition: transform 0.15s ease, background 0.15s ease;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(16px);
      background: var(--background);
    }

    /* ════════════════════════════════════════
       OUTPUT PANEL
    ════════════════════════════════════════ */
    .output-section {
      margin-bottom: 48px;
    }

    .output-section .section-label {
      margin-bottom: 16px;
    }

    .pg-output {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom: none;
      padding: 20px 24px;
      position: relative;
      min-height: 100px;
      transition: border-color 0.15s ease;
    }

    .pg-output.has-content { border-color: hsl(240 5% 26%); }

    .pg-output-prompt {
      font-family: 'Geist Mono', monospace;
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
      color: var(--foreground);
      min-height: 28px;
      padding-right: 90px;
    }

    .pg-output-flags {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--muted-foreground);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      word-break: break-all;
    }

    .pg-copy {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--secondary);
      border: 1px solid var(--border);
      color: var(--foreground);
      font-family: 'Geist', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .pg-copy:hover {
      background: hsl(240 3.7% 20%);
      border-color: hsl(240 5% 26%);
    }

    .pg-copy.ok {
      background: hsl(142 71% 45% / 0.12);
      border-color: hsl(142 71% 45% / 0.3);
      color: hsl(142 71% 45%);
    }

    /* ════════════════════════════════════════
       SLOT GRID
    ════════════════════════════════════════ */
    .slots-section {
      margin-bottom: 40px;
    }

    .slots-section .section-label {
      margin-bottom: 16px;
    }

    .pg-slots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 600px) {
      .pg-slots { grid-template-columns: 1fr; }
    }

    .pg-slot {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.12s ease;
    }

    .pg-slot.locked {
      border-color: hsl(240 5% 26%);
      background: hsl(240 3.7% 15.9% / 0.5);
    }

    .slot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .slot-label-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slot-color-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pg-slot-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
    }

    /* shadcn select */
    .slot-select {
      width: 100%;
      background: var(--secondary);
      border: 1px solid var(--border);
      color: var(--foreground);
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      padding: 8px 32px 8px 12px;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23a1a1aa' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      line-height: 1.4;
    }

    .slot-select:hover { border-color: hsl(240 5% 34%); }
    .slot-select:focus {
      outline: none;
      border-color: var(--ring);
      box-shadow: 0 0 0 2px hsl(240 4.9% 83.9% / 0.15);
    }
    .slot-select:disabled { opacity: 0.35; cursor: not-allowed; }

    /* shadcn input */
    .slot-input {
      width: 100%;
      background: var(--secondary);
      border: 1px solid var(--border);
      color: var(--foreground);
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: calc(var(--radius) - 2px);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .slot-input::placeholder { color: var(--muted-foreground); }
    .slot-input:hover { border-color: hsl(240 5% 34%); }

    .slot-input:focus {
      outline: none;
      border-color: var(--ring);
      box-shadow: 0 0 0 2px hsl(240 4.9% 83.9% / 0.15);
    }

    .slot-input:disabled { opacity: 0.35; cursor: not-allowed; }

    /* action row */
    .slot-actions {
      display: flex;
      gap: 6px;
    }

    .pg-sbtn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-foreground);
      font-family: 'Geist', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 7px 8px;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
      white-space: nowrap;
    }

    .pg-sbtn:hover:not(:disabled) {
      background: var(--secondary);
      border-color: hsl(240 5% 26%);
      color: var(--foreground);
    }

    .pg-sbtn.on {
      background: var(--foreground);
      border-color: var(--foreground);
      color: var(--background);
    }

    .pg-sbtn.on:hover {
      background: hsl(0 0% 85%);
    }

    .pg-sbtn.reroll {
      flex: 0 0 auto;
      padding: 7px 12px;
    }

    .pg-sbtn:disabled { opacity: 0.22; cursor: not-allowed; }

    /* ════════════════════════════════════════
       ACTIONS
    ════════════════════════════════════════ */
    .pg-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 56px;
    }

    .pg-gen {
      flex: 1;
      background: var(--foreground);
      border: 1px solid var(--foreground);
      color: var(--background);
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      padding: 12px 0;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .pg-gen:hover { background: hsl(0 0% 85%); border-color: hsl(0 0% 85%); }
    .pg-gen:active { transform: scale(0.997); }

    .pg-rst {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted-foreground);
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .pg-rst:hover {
      background: var(--destructive);
      border-color: var(--destructive);
      color: var(--destructive-foreground);
    }

    /* ════════════════════════════════════════
       HISTORY
    ════════════════════════════════════════ */
    .hist-section { }

    .hist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .pg-hist-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted-foreground);
    }

    .hist-hint {
      font-size: 11px;
      color: var(--muted-foreground);
    }

    .pg-hist-item {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--muted-foreground);
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) - 2px);
      margin-bottom: 6px;
      cursor: pointer;
      line-height: 1.65;
      transition: all 0.15s ease;
    }

    .pg-hist-item:hover {
      border-color: hsl(240 5% 26%);
      color: var(--foreground);
      background: var(--secondary);
    }

    /* ── Token colors ── */
    .cs { color: var(--c-subject); }
    .cg { color: var(--c-genre); }
    .cp { color: var(--c-prop); }
    .ce { color: var(--c-echo); }
    .cd { color: var(--c-directive); }
    .cr { color: var(--c-era); }
    .cf { color: var(--c-framing); }

    /* ── Output footer toggle ── */
    .output-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0;
      padding: 10px 16px;
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .output-footer-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      cursor: pointer;
      user-select: none;
    }

    .output-footer-label:hover { color: var(--foreground); }

    .output-footer-hint {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--muted-foreground);
    }

    /* ── Sticky copy pill ── */
    .sticky-copy {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Geist', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 14px 7px 11px;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0;
      pointer-events: none;
    }

    .sticky-copy.visible {
      opacity: 1;
      pointer-events: all;
    }

    .sticky-copy:hover {
      color: var(--foreground);
      border-color: hsl(240 5% 26%);
      background: var(--secondary);
    }

    .sticky-copy.ok {
      color: hsl(142 71% 45%);
      border-color: hsl(142 71% 45% / 0.3);
      background: hsl(142 71% 45% / 0.1);
    }

    @media (max-width: 768px) {
      .sticky-copy { bottom: 20px; right: 16px; }
    }
  </style>
</head>

<body>
<div id="pgr">

  <!-- ── HEADER ── -->
  <div class="pg-header">
    <div>
      <div class="pg-eyebrow">WANGHAF // Midjourney Formula Engine</div>
      <div class="pg-title">Prompt <span class="pg-title-accent">Gen</span></div>
    </div>
    <div class="pg-meta">
      <div class="pg-badge">
        <span class="pg-dot"></span>System Online
      </div>
      <div class="pg-meta-row">MJ V7 · Formula Mode</div>
      <div class="pg-meta-row" id="pg-counter">Output: 000</div>
    </div>
  </div>

  <!-- ── FLAGS ── -->
  <div class="flags-section">
    <div class="flags-section-header" id="flags-header">
      <span class="section-label" style="margin-bottom:0;">Parameter Flags</span>
      <span class="flags-chevron" id="flags-chevron">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
    <div class="flags-body" id="flags-body">
      <div class="flags-card" id="flags-card"></div>
    </div>
  </div>

  <!-- ── OUTPUT ── -->
  <div class="output-section">
    <div class="section-label">Output Prompt</div>
    <div class="pg-output" id="pg-output">
      <div class="pg-output-prompt" id="pg-text"></div>
      <div class="pg-output-flags" id="pg-flags-text" style="display:none;"></div>
      <button class="pg-copy" id="pg-copy">Copy</button>
    </div>
    <div class="output-footer">
      <label class="output-footer-label" for="flags-toggle">
        <label class="toggle" style="width:32px;height:18px;">
          <input type="checkbox" id="flags-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb" style="width:12px;height:12px;top:3px;left:3px;"></div>
        </label>
        Append parameter flags to output
      </label>
      <span class="output-footer-hint">copies what you see</span>
    </div>
  </div>

  <!-- ── SLOTS ── -->
  <div class="slots-section">
    <div class="section-label">Formula Slots</div>
    <div class="pg-slots" id="pg-slots"></div>
  </div>

  <!-- ── ACTIONS ── -->
  <div class="pg-actions">
    <button class="pg-gen" id="pg-gen">↺ &nbsp;Generate</button>
    <button class="pg-rst" id="pg-rst">Reset</button>
  </div>

  <!-- ── HISTORY ── -->
  <div id="pg-hist-wrap" style="display:none;">
    <div class="divider" style="margin-bottom:32px;"></div>
    <div class="hist-header">
      <div class="pg-hist-label">Recent Outputs</div>
      <div class="hist-hint">Click any entry to copy</div>
    </div>
    <div id="pg-hist-list"></div>
  </div>

  <!-- ── Sticky copy pill ── -->
  <button class="sticky-copy" id="sticky-copy" aria-label="Copy prompt">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2H3.5A1.5 1.5 0 0 0 2 3.5V9.5A1.5 1.5 0 0 0 3.5 11H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Copy
  </button>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const V = {
  subject: ["Man","Woman","Figure","Child","Crowd","Twins","Soldier","Elder","Warrior","Priest","Prophet","Body","Ghost","Machine","Stranger"],
  genre: ["horror transhumanism","horror biomechanics","horror parasitism","horror entropy","horror surveillance","horror liminality","horror urbanism","horror somnambulism","horror cartography","horror body modification","mythology dissolution","mythology exile","divinity collapse","theology erosion","shamanism ascent","ecology collapse","symbiosis inversion","flora possession","fauna merger","terrain absorption","authority corruption","hierarchy collapse","ideology fracture","institution decay","resistance emergence","obsession spiral","memory erosion","grief architecture","paranoia geometry","ego dissolution","violence economy","loyalty collapse","ritual punishment","predation elegance","underworld ascent"],
  prop: ["clock","spine","mirror","candle","wire","eye","mouth","thread","photograph","knife","crown","flag","uniform","coin","scar","root","spore","feather","stone","seal","bone","gear","circuit","glass","silk","needle","door","altar","map","relic"],
  echo: ["time","architecture","ritual decay","threshold","signal loss","nerve","void","absence","repetition","distance","angle","face","transaction","oath","code","crossing","age","vision","silence","faith","spread","instinct","weight","decree","mass","border","rule","fist","wall","erasure","descent","hunger","pressure"],
  directive: ["high-contrast","overexposed blown-out","underlit shadow-heavy","grainy low-resolution","flat graphic two-tone","heavily textured gritty","high-grain","low-key editorial","monochrome","duotone","overexposed washed","clinical sharp","halftone degraded","deep chiaroscuro","bleached archival"],
  era: ["2000s aesthetic","90s industrial aesthetic","80s sci-fi aesthetic","70s exploitation aesthetic","70s cinema verité aesthetic","art deco aesthetic","Cold War propaganda aesthetic","Byzantine aesthetic","Roman fresco aesthetic","medieval manuscript aesthetic","Victorian naturalist aesthetic","Weimar expressionist aesthetic","Soviet propaganda aesthetic","constructivist poster aesthetic","Hitchcock noir aesthetic","neo-noir aesthetic","outsider art aesthetic","darkroom aesthetic","slow cinema aesthetic","technical drawing aesthetic","experimental theater aesthetic","brutalist noir aesthetic","brutalist aesthetic","90s zine aesthetic","millennium aesthetic"],
  framing: ["eye-level medium shot","low angle wide shot","high angle full shot","extreme close-up","bird's eye overhead","worm's eye looking up","dutch angle canted frame","isometric view","axonometric projection","over-the-shoulder two-shot","cowboy shot wide","extreme wide establishing","deep focus pan","shallow depth of field foreground bokeh","split diopter dual plane","symmetrical center frame","negative space dominant","rule of thirds off-center","leading lines into depth","frame within frame","diagonal composition","silhouette backlit rim","foreground obstruction","rack focus pull","forced perspective distortion"]
};

const KEYS   = ["subject","genre","prop","echo","directive","era","framing"];
const LABELS  = { subject:"Subject", genre:"Genre Fusion", prop:"Prop", echo:"Echo", directive:"Directive", era:"Era Anchor", framing:"Framing" };
const CLS    = { subject:"cs", genre:"cg", prop:"cp", echo:"ce", directive:"cd", era:"cr", framing:"cf" };
const COLORS = { subject:"#00ffe0", genre:"#ff8c42", prop:"#a8e063", echo:"#6ee7b7", directive:"#93c5fd", era:"#c4b5fd", framing:"#fbbf24" };

/* ═══════════════════════════════════════════════════
   FLAGS CONFIG
═══════════════════════════════════════════════════ */
const FLAGS = [
  { id:"ar",      flag:"--ar",      value:"3:4",  desc:"Aspect ratio",           on:true,  editable:true  },
  { id:"chaos",   flag:"--chaos",   value:"50",   desc:"Variation amount",        on:true,  editable:true  },
  { id:"exp",     flag:"--exp",     value:"50",   desc:"Experimental rendering",  on:true,  editable:true  },
  { id:"v",       flag:"--v",       value:"7",    desc:"Model version",           on:true,  editable:true  },
  { id:"raw",     flag:"--raw",     value:"",     desc:"Less processed output",   on:true,  editable:false },
  { id:"stylize", flag:"--stylize", value:"800",  desc:"Aesthetic strength",      on:true,  editable:true  },
  { id:"ow",      flag:"--ow",      value:"550",  desc:"Outpainting width",       on:false, editable:true  },
];

let flagState  = {};
let flagValues = {};
FLAGS.forEach(f => { flagState[f.id] = f.on; flagValues[f.id] = f.value; });

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function rslots() { const s={}; KEYS.forEach(k => s[k]=pick(V[k])); return s; }

let slots   = rslots();
let locked  = {};  KEYS.forEach(k => locked[k]=false);
let customs = {};  KEYS.forEach(k => customs[k]='');
let hist    = [];
let count   = 0;
let includeFlags = true;

function val(k)  { return customs[k].trim() || slots[k]; }
function flags() {
  return FLAGS
    .filter(f => flagState[f.id])
    .map(f => f.editable ? `${f.flag} ${flagValues[f.id]}`.trim() : f.flag)
    .join(' ');
}
function getP()  { return KEYS.map(k=>val(k)).join(', '); }
function getFull(){ if (!includeFlags) return getP(); const f=flags(); return f ? `${getP()} ${f}` : getP(); }

/* ═══════════════════════════════════════════════════
   RENDER FLAGS
═══════════════════════════════════════════════════ */
function rFlags() {
  document.getElementById('flags-card').innerHTML = FLAGS.map(f => `
    <div class="flag-row${flagState[f.id] ? '' : ' disabled'}">
      <div class="flag-left">
        <label class="toggle">
          <input type="checkbox" data-flag="${f.id}" ${flagState[f.id] ? 'checked' : ''}>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="flag-name">${f.flag}</span>
        ${f.editable ? `<input class="flag-value-input" type="text" data-flag-val="${f.id}" value="${flagValues[f.id]}" spellcheck="false">` : ''}
      </div>
      <span class="flag-desc">${f.desc}</span>
    </div>
  `).join('');

  document.querySelectorAll('[data-flag]').forEach(cb => {
    cb.onchange = () => {
      flagState[cb.dataset.flag] = cb.checked;
      cb.closest('.flag-row').classList.toggle('disabled', !cb.checked);
      rOutput();
    };
  });

  document.querySelectorAll('[data-flag-val]').forEach(inp => {
    inp.oninput = () => {
      flagValues[inp.dataset.flagVal] = inp.value.trim();
      rOutput();
    };
    inp.onfocus = () => inp.select();
  });
}

/* ═══════════════════════════════════════════════════
   RENDER OUTPUT
═══════════════════════════════════════════════════ */
function rOutput() {
  const html = [
    `<span class="cs">${val('subject')}</span>`,
    `<span class="cg">${val('genre')}</span>`,
    `<span class="cp">${val('prop')}</span>`,
    `<span class="ce">${val('echo')}</span>`,
    `<span class="cd">${val('directive')}</span>`,
    `<span class="cr">${val('era')}</span>`,
    `<span class="cf">${val('framing')}</span>`,
  ].join(', ');

  document.getElementById('pg-text').innerHTML = html;

  const f = flags();
  const flagEl = document.getElementById('pg-flags-text');
  if (f && includeFlags) {
    flagEl.style.display = '';
    flagEl.textContent = f;
  } else {
    flagEl.style.display = 'none';
  }

  document.getElementById('pg-output').classList.toggle('has-content', true);
}

/* ═══════════════════════════════════════════════════
   RENDER SLOTS
═══════════════════════════════════════════════════ */
function rSlots() {
  document.getElementById('pg-slots').innerHTML = KEYS.map(k => {
    const isLocked = locked[k];
    const options  = [...V[k]].sort((a,b)=>a.localeCompare(b)).map(v =>
      `<option value="${v}" ${v===slots[k]?'selected':''}>${v}</option>`
    ).join('');

    return `
    <div class="pg-slot${isLocked?' locked':''}" data-slot="${k}">
      <div class="slot-header">
        <div class="slot-label-group">
          <div class="slot-color-dot" style="background:${COLORS[k]};"></div>
          <span class="pg-slot-label">${LABELS[k]}</span>
        </div>
      </div>

      <select class="slot-select" data-select="${k}" ${isLocked?'disabled':''}>
        ${options}
      </select>

      <input
        class="slot-input"
        type="text"
        placeholder="Override — type custom value…"
        value="${customs[k]}"
        data-input="${k}"
        ${isLocked?'disabled':''}
      />

      <div class="slot-actions">
        <button class="pg-sbtn${isLocked?' on':''}" data-lock="${k}">
          ${isLocked?'Locked':'Lock'}
        </button>
        <button class="pg-sbtn reroll" data-reroll="${k}" ${isLocked?'disabled':''}>↺</button>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('[data-select]').forEach(el => {
    el.onchange = () => {
      const k = el.dataset.select;
      if (!locked[k]) { slots[k] = el.value; rOutput(); }
    };
  });

  document.querySelectorAll('[data-input]').forEach(el => {
    el.oninput = () => {
      const k = el.dataset.input;
      customs[k] = el.value;
      rOutput();
    };
  });

  document.querySelectorAll('[data-lock]').forEach(b => {
    b.onclick = () => {
      const k = b.dataset.lock;
      locked[k] = !locked[k];
      rSlots();
    };
  });

  document.querySelectorAll('[data-reroll]').forEach(b => {
    b.onclick = () => {
      const k = b.dataset.reroll;
      if (!locked[k]) { slots[k]=pick(V[k]); customs[k]=''; rOutput(); rSlots(); }
    };
  });
}

/* ═══════════════════════════════════════════════════
   HISTORY
═══════════════════════════════════════════════════ */
function rHist() {
  const w = document.getElementById('pg-hist-wrap');
  if (!hist.length) { w.style.display='none'; return; }
  w.style.display='block';
  document.getElementById('pg-hist-list').innerHTML =
    hist.map((p,i)=>`<div class="pg-hist-item" data-hi="${i}">${p}</div>`).join('');
  document.querySelectorAll('[data-hi]').forEach(el =>
    el.onclick = () => navigator.clipboard.writeText(hist[el.dataset.hi]));
}

/* ═══════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════ */
document.getElementById('pg-gen').onclick = () => {
  hist = [getFull(), ...hist].slice(0,8);
  KEYS.forEach(k => { if (!locked[k]) { slots[k]=pick(V[k]); customs[k]=''; } });
  count++;
  document.getElementById('pg-counter').textContent = `Output: ${String(count).padStart(3,'0')}`;
  rOutput(); rSlots(); rHist();
};

document.getElementById('pg-rst').onclick = () => {
  slots = rslots();
  KEYS.forEach(k => { locked[k]=false; customs[k]=''; });
  rOutput(); rSlots();
};

document.getElementById('pg-copy').onclick = function() {
  navigator.clipboard.writeText(getFull()).then(() => {
    this.textContent='✓ Copied';
    this.classList.add('ok');
    setTimeout(()=>{ this.textContent='Copy'; this.classList.remove('ok'); }, 1800);
  });
};

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
rFlags();
rOutput();
rSlots();

document.getElementById('flags-toggle').onchange = function() {
  includeFlags = this.checked;
  rOutput();
};

const stickyPill = document.getElementById('sticky-copy');

const pillObserver = new IntersectionObserver(
  ([entry]) => stickyPill.classList.toggle('visible', !entry.isIntersecting),
  { threshold: 0 }
);
pillObserver.observe(document.getElementById('pg-output'));

stickyPill.onclick = function() {
  navigator.clipboard.writeText(getFull()).then(() => {
    this.classList.add('ok');
    setTimeout(() => this.classList.remove('ok'), 1800);
  });
};

let flagsCollapsed = false;
document.getElementById('flags-header').onclick = () => {
  flagsCollapsed = !flagsCollapsed;
  document.getElementById('flags-body').classList.toggle('collapsed', flagsCollapsed);
  document.getElementById('flags-chevron').classList.toggle('collapsed', flagsCollapsed);
};
</script>
</body>
</html>
