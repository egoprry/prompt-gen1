<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WANGHAF // Prompt Gen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Geist Design System – Dark Mode Tokens ── */
    :root {
      /* Backgrounds */
      --ds-bg-100: #000000;
      --ds-bg-200: #0a0a0a;

      /* Gray Scale */
      --ds-gray-100: #141414;
      --ds-gray-200: #1e1e1e;
      --ds-gray-300: #2a2a2a;
      --ds-gray-400: #383838;
      --ds-gray-500: #505050;
      --ds-gray-600: #707070;
      --ds-gray-700: #999999;
      --ds-gray-800: #c0c0c0;
      --ds-gray-900: #eeeeee;
      --ds-gray-1000: #ffffff;

      /* WANGHAF brand accent */
      --accent:        #00ffe0;
      --accent-subtle: rgba(0, 255, 224, 0.08);
      --accent-border: rgba(0, 255, 224, 0.30);
      --accent-dim:    rgba(0, 255, 224, 0.65);

      /* Destructive */
      --red:           #ff5555;
      --red-subtle:    rgba(255, 85, 85, 0.09);
      --red-border:    rgba(255, 85, 85, 0.35);
      --red-dim:       rgba(255, 85, 85, 0.65);

      /* Semantic aliases */
      --border:        var(--ds-gray-400);
      --border-hover:  var(--ds-gray-600);
      --surface:       #0e0e0e;
      --surface-raised:var(--ds-gray-200);
      --text-primary:  var(--ds-gray-1000);
      --text-secondary:var(--ds-gray-800);
      --text-tertiary: var(--ds-gray-700);

      /* Prompt token colors */
      --c-subject:   #00ffe0;
      --c-genre:     #ff8c42;
      --c-prop:      #a8e063;
      --c-echo:      #6ee7b7;
      --c-directive: #93c5fd;
      --c-era:       #c4b5fd;

      /* Spacing rhythm */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 16px;
      --r-lg: 24px;
      --r-xl: 32px;

      /* Radii */
      --radius-sm: 5px;
      --radius-md: 7px;
      --radius-lg: 10px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--ds-bg-100);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    /* ────────────────────────────────────────
       Layout
    ──────────────────────────────────────── */
    #pgr {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ────────────────────────────────────────
       Header
    ──────────────────────────────────────── */
    .pg-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding-bottom: var(--r-lg);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--r-xl);
    }

    .pg-eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--ds-gray-800);
      text-transform: uppercase;
      margin-bottom: var(--r-sm);
    }

    .pg-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      line-height: 1;
    }

    .pg-title-accent {
      color: var(--accent);
    }

    /* right-side status cluster */
    .pg-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    /* Geist-style badge / pill */
    .pg-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--ds-gray-900);
      background: var(--ds-gray-200);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 999px; /* pill */
    }

    .pg-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .pg-meta-row {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--ds-gray-800);
      letter-spacing: 0.04em;
    }

    /* ────────────────────────────────────────
       Output Panel
    ──────────────────────────────────────── */
    .pg-output-wrap {
      margin-bottom: var(--r-md);
    }

    .pg-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      position: relative;
      min-height: 90px;
      transition: border-color 0.15s ease;
    }

    .pg-output.has-content {
      border-color: var(--accent-border);
    }

    .pg-output-label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--ds-gray-800);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .pg-output-text {
      font-family: 'Geist Mono', monospace;
      font-size: 14px;
      line-height: 1.75;
      word-break: break-word;
      color: var(--ds-gray-1000);
      min-height: 24px;
    }

    /* Geist-style ghost button */
    .pg-copy {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--ds-gray-200);
      border: 1px solid var(--border);
      color: var(--ds-gray-900);
      font-family: 'Geist', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.1s ease;
      white-space: nowrap;
    }

    .pg-copy:hover {
      background: var(--ds-gray-300);
      border-color: var(--border-hover);
      color: var(--ds-gray-1000);
    }

    .pg-copy.ok {
      background: var(--accent-subtle);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ────────────────────────────────────────
       Slot Grid
    ──────────────────────────────────────── */
    .pg-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--r-sm);
      margin-bottom: var(--r-md);
    }

    /* Geist "entity" card style */
    .pg-slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      transition: border-color 0.12s ease;
    }

    .pg-slot.locked {
      border-color: var(--accent-border);
      background: var(--accent-subtle);
    }

    .pg-slot-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ds-gray-800);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .pg-slot-value {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 1;
    }

    .pg-slot-actions {
      display: flex;
      gap: 5px;
    }

    /* Geist secondary button – small */
    .pg-sbtn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ds-gray-800);
      font-family: 'Geist', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.1s ease;
      text-align: center;
      white-space: nowrap;
    }

    .pg-sbtn:hover:not(:disabled) {
      background: var(--ds-gray-200);
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .pg-sbtn.on {
      background: var(--accent-subtle);
      border-color: var(--accent-border);
      color: var(--accent-dim);
    }

    .pg-sbtn.on:hover {
      background: rgba(0, 255, 224, 0.1);
      color: var(--accent);
    }

    .pg-sbtn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    /* ────────────────────────────────────────
       Actions
    ──────────────────────────────────────── */
    .pg-actions {
      display: flex;
      gap: var(--r-sm);
      margin-bottom: var(--r-xl);
    }

    /* Geist primary button – white fill */
    .pg-gen {
      flex: 1;
      background: var(--ds-gray-1000);
      border: 1px solid var(--ds-gray-1000);
      color: var(--ds-bg-100);
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      padding: 10px 0;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }

    .pg-gen:hover {
      background: var(--ds-gray-900);
      border-color: var(--ds-gray-900);
    }

    .pg-gen:active {
      transform: scale(0.995);
      background: var(--ds-gray-800);
    }

    /* Geist secondary destructive button */
    .pg-rst {
      background: transparent;
      border: 1px solid var(--red-border);
      color: var(--red-dim);
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .pg-rst:hover {
      background: var(--red-subtle);
      border-color: var(--red);
      color: var(--red);
    }

    /* ────────────────────────────────────────
       History
    ──────────────────────────────────────── */
    .pg-hist-header {
      display: flex;
      align-items: center;
      gap: var(--r-sm);
      margin-bottom: var(--r-md);
    }

    .pg-hist-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: var(--r-lg);
    }

    .pg-hist-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ds-gray-800);
      text-transform: uppercase;
    }

    /* Geist table-row style */
    .pg-hist-item {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--ds-gray-800);
      padding: 10px 14px;
      border: 1px solid var(--ds-gray-300);
      border-radius: var(--radius-md);
      margin-bottom: 5px;
      cursor: pointer;
      line-height: 1.6;
      transition: all 0.1s ease;
    }

    .pg-hist-item:hover {
      border-color: var(--border-hover);
      color: var(--ds-gray-1000);
      background: var(--ds-gray-200);
    }

    /* ────────────────────────────────────────
       Prompt Token Colors
    ──────────────────────────────────────── */
    .cs { color: var(--c-subject); }
    .cg { color: var(--c-genre); }
    .cp { color: var(--c-prop); }
    .ce { color: var(--c-echo); }
    .cd { color: var(--c-directive); }
    .cr { color: var(--c-era); }
  </style>
</head>

<body>
  <div id="pgr">

    <!-- Header -->
    <div class="pg-header">
      <div>
        <div class="pg-eyebrow">WANGHAF // Midjourney Formula Engine</div>
        <div class="pg-title">Prompt <span class="pg-title-accent">Gen</span></div>
      </div>
      <div class="pg-meta">
        <div class="pg-badge">
          <span class="pg-dot"></span>
          System Online
        </div>
        <div class="pg-meta-row">MJ V7 · Formula Mode</div>
        <div class="pg-meta-row" id="pg-counter">Output: 000</div>
      </div>
    </div>

    <!-- Output Panel -->
    <div class="pg-output-wrap">
      <div class="pg-output" id="pg-output">
        <div class="pg-output-label">Output Prompt</div>
        <div class="pg-output-text" id="pg-text"></div>
        <button class="pg-copy" id="pg-copy">Copy</button>
      </div>
    </div>

    <!-- Slot Grid -->
    <div class="pg-slots" id="pg-slots"></div>

    <!-- Actions -->
    <div class="pg-actions">
      <button class="pg-gen" id="pg-gen">↺ Generate</button>
      <button class="pg-rst" id="pg-rst">Reset</button>
    </div>

    <!-- History -->
    <div id="pg-hist-wrap" style="display:none;">
      <div class="pg-hist-divider"></div>
      <div class="pg-hist-label">Recent Outputs — click to copy</div>
      <div style="height:12px;"></div>
      <div id="pg-hist-list"></div>
    </div>

  </div>

  <script>
    const V = {
      subject: ["Man", "Woman", "Figure", "Child", "Crowd", "Twins", "Soldier", "Elder", "Warrior", "Priest", "Prophet", "Body", "Ghost", "Machine", "Stranger"],
      genre: ["horror transhumanism", "horror biomechanics", "horror parasitism", "horror entropy", "horror surveillance", "horror liminality", "horror urbanism", "horror somnambulism", "horror cartography", "horror body modification", "mythology dissolution", "mythology exile", "divinity collapse", "theology erosion", "shamanism ascent", "ecology collapse", "symbiosis inversion", "flora possession", "fauna merger", "terrain absorption", "authority corruption", "hierarchy collapse", "ideology fracture", "institution decay", "resistance emergence", "obsession spiral", "memory erosion", "grief architecture", "paranoia geometry", "ego dissolution", "violence economy", "loyalty collapse", "ritual punishment", "predation elegance", "underworld ascent"],
      prop: ["clock", "spine", "mirror", "candle", "wire", "eye", "mouth", "thread", "photograph", "knife", "crown", "flag", "uniform", "coin", "scar", "root", "spore", "feather", "stone", "seal", "bone", "gear", "circuit", "glass", "silk", "needle", "door", "altar", "map", "relic"],
      echo: ["time", "architecture", "ritual decay", "threshold", "signal loss", "nerve", "void", "absence", "repetition", "distance", "angle", "face", "transaction", "oath", "code", "crossing", "age", "vision", "silence", "faith", "spread", "instinct", "weight", "decree", "mass", "border", "rule", "fist", "wall", "erasure", "descent", "hunger", "pressure"],
      directive: ["high-contrast", "overexposed blown-out", "underlit shadow-heavy", "grainy low-resolution", "flat graphic two-tone", "heavily textured gritty", "high-grain", "low-key editorial", "monochrome", "duotone", "overexposed washed", "clinical sharp", "halftone degraded", "deep chiaroscuro", "bleached archival"],
      era: ["2000s aesthetic", "90s industrial aesthetic", "80s sci-fi aesthetic", "70s exploitation aesthetic", "70s cinema verité aesthetic", "art deco aesthetic", "Cold War propaganda aesthetic", "Byzantine aesthetic", "Roman fresco aesthetic", "medieval manuscript aesthetic", "Victorian naturalist aesthetic", "Weimar expressionist aesthetic", "Soviet propaganda aesthetic", "constructivist poster aesthetic", "Hitchcock noir aesthetic", "neo-noir aesthetic", "outsider art aesthetic", "darkroom aesthetic", "slow cinema aesthetic", "technical drawing aesthetic", "experimental theater aesthetic", "brutalist noir aesthetic", "brutalist aesthetic", "90s zine aesthetic", "millennium aesthetic"]
    };

    const KEYS   = ["subject", "genre", "prop", "echo", "directive", "era"];
    const LABELS  = { subject: "Subject", genre: "Genre Fusion", prop: "Prop", echo: "Echo", directive: "Directive", era: "Era Anchor" };
    const CLS     = { subject: "cs", genre: "cg", prop: "cp", echo: "ce", directive: "cd", era: "cr" };

    function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
    function rslots() { const s = {}; KEYS.forEach(k => s[k] = pick(V[k])); return s; }

    let slots  = rslots();
    let locked = { subject: false, genre: false, prop: false, echo: false, directive: false, era: false };
    let hist   = [];
    let count  = 0;

    function getP() {
      return `${slots.subject} ${slots.genre}, ${slots.prop}, ${slots.echo}, ${slots.directive} ${slots.era}`;
    }

    function rPrompt() {
      const el = document.getElementById("pg-text");
      el.innerHTML = `<span class="cs">${slots.subject}</span> <span class="cg">${slots.genre}</span>, <span class="cp">${slots.prop}</span>, <span class="ce">${slots.echo}</span>, <span class="cd">${slots.directive}</span> <span class="cr">${slots.era}</span>`;
      document.getElementById("pg-output").classList.toggle("has-content", el.textContent.trim().length > 0);
    }

    function rSlots() {
      document.getElementById("pg-slots").innerHTML = KEYS.map(k => `
        <div class="pg-slot${locked[k] ? ' locked' : ''}">
          <div class="pg-slot-label">${LABELS[k]}</div>
          <div class="pg-slot-value ${CLS[k]}">${slots[k]}</div>
          <div class="pg-slot-actions">
            <button class="pg-sbtn${locked[k] ? ' on' : ''}" data-lock="${k}">${locked[k] ? 'Locked' : 'Lock'}</button>
            <button class="pg-sbtn" data-reroll="${k}" ${locked[k] ? 'disabled' : ''}>↺</button>
          </div>
        </div>`).join('');

      document.querySelectorAll('[data-lock]').forEach(b =>
        b.onclick = () => { locked[b.dataset.lock] = !locked[b.dataset.lock]; rSlots(); });

      document.querySelectorAll('[data-reroll]').forEach(b =>
        b.onclick = () => {
          const k = b.dataset.reroll;
          if (!locked[k]) { slots[k] = pick(V[k]); rPrompt(); rSlots(); }
        });
    }

    function rHist() {
      const w = document.getElementById("pg-hist-wrap");
      if (!hist.length) { w.style.display = 'none'; return; }
      w.style.display = 'block';
      document.getElementById("pg-hist-list").innerHTML =
        hist.map((p, i) => `<div class="pg-hist-item" data-hi="${i}">${p}</div>`).join('');
      document.querySelectorAll('[data-hi]').forEach(el =>
        el.onclick = () => navigator.clipboard.writeText(hist[el.dataset.hi]));
    }

    document.getElementById("pg-gen").onclick = () => {
      hist = [getP(), ...hist].slice(0, 8);
      KEYS.forEach(k => { if (!locked[k]) slots[k] = pick(V[k]); });
      count++;
      document.getElementById("pg-counter").textContent = `Output: ${String(count).padStart(3, '0')}`;
      rPrompt(); rSlots(); rHist();
    };

    document.getElementById("pg-rst").onclick = () => {
      slots  = rslots();
      locked = { subject: false, genre: false, prop: false, echo: false, directive: false, era: false };
      rPrompt(); rSlots();
    };

    document.getElementById("pg-copy").onclick = function () {
      navigator.clipboard.writeText(getP()).then(() => {
        this.textContent = '✓ Copied';
        this.classList.add('ok');
        setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('ok'); }, 1800);
      });
    };

    rPrompt(); rSlots();
  </script>
</body>
</html>
